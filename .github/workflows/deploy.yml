name: 🚀 Deploy Website to InfinityFree

on:
  push:
    branches:
      - main # Triggers the deploy when code is pushed to the main branch

jobs:
  web-deploy:
    name: 🎉 Sync FTP Files
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4 # Upgraded to v4 to resolve Node.js 20 deprecation warning

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: htdocs/            # Uploads everything directly into the htdocs folder
        local-dir: ./                  # Deploys from the root of your Github repository
        exclude: |
          **/.git*
          **/.git*/**
          .github/**
          README.md
          .ftp-deploy-sync-state.json
          ftp-sync.json
          email_alerts.log
          uploads/**                   # Exclude uploaded items so Git doesn't overwrite live uploads
          uploads/                     # Exclude uploads folder to prevent 553 Permission Denied
          syafiqah/matching/email_alerts.log
          files for your website should be uploaded here!
          "files for your website should be uploaded here!"
